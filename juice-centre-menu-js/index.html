<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#f4f1e8">
    <title>Shri Ganesh Juice Centre Digital Menu</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/store.js" defer></script>
    <script src="js/menu.js" defer></script>
</head>
<body class="customer-body">
    <div class="ambient-background" aria-hidden="true">
        <span class="ambient-orb ambient-orb-one"></span>
        <span class="ambient-orb ambient-orb-two"></span>
        <span class="ambient-orb ambient-orb-three"></span>
    </div>

    <header id="site-header" class="site-header">
        <nav class="nav-inner" aria-label="Main navigation">
            <a class="logo" href="index.html" aria-label="Shri Ganesh Juice Centre menu">
                <span class="logo-mark" aria-hidden="true">
                    <svg viewBox="0 0 32 32" role="img">
                        <path d="M8 18c0-6.6 5.4-12 12-12 0 6.6-5.4 12-12 12Z"></path>
                        <path d="M9 18c4.5-.4 8.3-2.9 11-7"></path>
                        <path d="M7 17c5.5 0 10 4.5 10 10H7V17Z"></path>
                    </svg>
                </span>
                <span class="logo-copy">
                    <strong>Shri Ganesh Juice Centre</strong>
                    <small>Freshly poured</small>
                </span>
            </a>

            <a class="nav-link" href="about.html">
                <span>About</span>
                <svg viewBox="0 0 20 20" aria-hidden="true">
                    <path d="m7 4 6 6-6 6"></path>
                </svg>
            </a>
        </nav>
    </header>

    <main class="menu-page">
        <section class="menu-intro entrance" aria-labelledby="menu-heading">
            <h1 id="menu-heading">Find your <em>perfect drink.</em></h1>
        </section>

        <section class="menu-controls entrance" aria-label="Menu search and filters">
            <div class="search-shell">
                <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="11" cy="11" r="6.5"></circle>
                    <path d="m16 16 4 4"></path>
                </svg>
                <label class="visually-hidden" for="menu-search">Search menu</label>
                <input
                    id="menu-search"
                    type="search"
                    placeholder="Search juices, shakes, soda..."
                    autocomplete="off"
                >
                <button id="search-clear" class="search-clear" type="button" aria-label="Clear search" hidden>
                    <svg viewBox="0 0 20 20" aria-hidden="true"><path d="m6 6 8 8M14 6l-8 8"></path></svg>
                </button>
            </div>

            <div class="filter-scroll">
                <div id="type-filters" class="type-filters" role="group" aria-label="Filter menu by type">
                    <!-- filter buttons injected by menu.js -->
                </div>
            </div>
        </section>

        <section class="menu-results" aria-labelledby="results-heading">
            <div class="results-heading entrance">
                <div>
                    <p class="section-kicker">Explore the menu</p>
                    <h2 id="results-heading">Made for your mood</h2>
                </div>
                <p id="result-count" class="result-count" aria-live="polite"></p>
            </div>

            <div id="menu-grid" class="menu-grid" aria-label="Menu items">
                <!-- menu cards injected by menu.js -->
            </div>

            <div id="no-results" class="empty-state" role="status" aria-live="polite" hidden>
                <div class="empty-illustration" aria-hidden="true">
                    <span class="empty-fruit"></span>
                    <svg viewBox="0 0 72 72">
                        <path d="M22 18h31l-4 42H27l-5-42Z"></path>
                        <path d="M19 18h37M41 18 50 6M29 34c6-5 11 5 18 0"></path>
                    </svg>
                </div>
                <h2 id="empty-state-title" class="empty-state-title">No drinks available right now.</h2>
                <p id="empty-state-copy">Please check back soon for something fresh.</p>
            </div>
        </section>
    </main>

    <div
        id="item-modal"
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-name"
        aria-hidden="true"
        hidden
    >
        <div class="modal-panel">
            <button id="modal-close" class="modal-close" type="button" aria-label="Close item details">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m7 7 10 10M17 7 7 17"></path></svg>
            </button>

            <div class="modal-image-wrap">
                <img id="modal-image" alt="" hidden>
                <div id="modal-image-placeholder" class="image-placeholder">
                    <svg viewBox="0 0 64 64" aria-hidden="true">
                        <path d="M20 18h27l-3 36H23l-3-36Z"></path>
                        <path d="M17 18h33M37 18l7-10M27 29c5-4 9 4 15 0"></path>
                        <circle cx="17" cy="11" r="5"></circle>
                    </svg>
                    <span>Fresh photo coming soon</span>
                </div>
            </div>

            <div class="modal-content">
                <p class="modal-eyebrow">Drink details</p>
                <p id="modal-type" class="modal-type"></p>
                <h2 id="modal-name"></h2>
                <p id="modal-price" class="menu-item-price modal-price"></p>
                <div id="modal-description-wrap" class="modal-description-wrap" hidden>
                    <p id="modal-description"></p>
                </div>
                <p id="modal-availability" class="availability-badge modal-availability"><span class="availability-dot" aria-hidden="true"></span><span id="modal-availability-text"></span></p>
                <p class="modal-note">Prepared fresh when you visit.</p>
            </div>
        </div>
    </div>
</body>
</html>
